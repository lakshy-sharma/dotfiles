# ==============================================================================
# ~/.tmux.conf
# ==============================================================================

# --- Prefix: Ctrl+a (ergonomic alternative to Ctrl+b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Core ---
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 0          # Instant Esc in Neovim
set -g history-limit 10000
set -g base-index 1           # Windows start at 1
setw -g pane-base-index 1

# --- Splits (intuitive | and -) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resize ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Status bar ---
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left '#[fg=colour226,bold] #S '
set -g status-right '#[fg=colour226,bold] %H:%M %d-%b '
set -g status-right-length 50
set -g status-left-length 30

# Active window title
setw -g window-status-current-format '#[fg=colour81,bold] #I:#W '
setw -g window-status-format '#[fg=colour245] #I:#W '

# --- Copy mode (vim keys) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip"
